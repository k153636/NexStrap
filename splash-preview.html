<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexStrap Splash Simulation</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  gap:24px;
  user-select:none;
}

/* ── MainWindow mock ── */
.window {
  width:860px; height:560px;
  background:#000;
  position:relative;
  border:1px solid #222;
  border-radius:4px;
  box-shadow:0 40px 100px rgba(0,0,0,.9);
  overflow:hidden;
}
.window-content {
  width:100%; height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.window-content p {
  color:#333; font-size:14px; letter-spacing:2px;
}

/* ── Splash overlay (mirrors Avalonia: Grid.RowSpan=3, full window) ── */
.splash-overlay {
  position:absolute; inset:0;
  background:#000;
  display:flex; align-items:center; justify-content:center;
  opacity:1;
  transition:none;
  z-index:10;
}

/* SplashContent StackPanel */
.splash-content {
  display:flex; flex-direction:column;
  align-items:center; gap:16px;
  opacity:0;
}

/* Border wrapper — RenderTransformOrigin="0.5,0.5" */
.logo-wrapper {
  width:58px; height:58px;
  transform-origin:center center;   /* = RenderTransformOrigin 0.5,0.5 */
  transform:rotate(0deg);
  /* debug: uncomment to see bounding box */
  /* outline:1px solid red; */
}

.logo-wrapper img {
  width:58px; height:58px;
  display:block;
}

.splash-title {
  color:#fff;
  font-size:22px; font-weight:700;
  letter-spacing:1.5px;
}

/* ── debug indicator ── */
.debug-panel {
  color:#666; font-size:12px;
  font-family:monospace;
  background:#0a0a0a;
  border:1px solid #1e1e1e;
  border-radius:4px;
  padding:10px 16px;
  min-width:320px;
  line-height:1.8;
}
.debug-panel span { color:#4af; }

/* ── controls ── */
.controls {
  display:flex; gap:10px;
}
button {
  background:#1a1a1a; color:#888;
  border:1px solid #2a2a2a;
  border-radius:6px; padding:8px 20px;
  font-size:12px; cursor:pointer;
}
button:hover { color:#ccc; border-color:#444; }
</style>
</head>

<script>
// ── cubic-bezier solver (matches Avalonia SplineEase) ──────────────────────
function bz(t,c1,c2){ return 3*c1*t*(1-t)*(1-t)+3*c2*t*t*(1-t)+t*t*t; }
function bzD(t,c1,c2){ return 3*c1*(1-t)*(1-2*t)+3*c2*t*(2-3*t)+3*t*t; }
function spline(t, x1,y1,x2,y2){
  if(t<=0) return 0; if(t>=1) return 1;
  let s=t;
  for(let i=0;i<8;i++){
    const dx=bz(s,x1,x2)-t, d=bzD(s,x1,x2);
    if(Math.abs(dx)<1e-6||Math.abs(d)<1e-6) break;
    s-=dx/d;
  }
  return bz(s,y1,y2);
}
// cubic ease out / in (same as Avalonia CubicEaseOut / CubicEaseIn)
function cubicEaseOut(t){ return 1-Math.pow(1-t,3); }
function cubicEaseIn(t){ return t*t*t; }

// ── elements ───────────────────────────────────────────────────────────────
const overlay    = document.getElementById('overlay');
const content    = document.getElementById('content');
const logoWrapper= document.getElementById('logoWrapper');
const dPhase     = document.getElementById('dPhase');
const dAngle     = document.getElementById('dAngle');
const dOp        = document.getElementById('dOp');

const T_SPIN = 1100;
const T_HOLD = 400;
const T_TOTAL_SPIN = 1500; // one cycle budget

let rafId=null, running=false;

function setPhase(s){ dPhase.textContent=s; }
function setAngle(a){ dAngle.textContent=a.toFixed(1)+'°'; logoWrapper.style.transform='rotate('+a+'deg)'; }
function setOp(el,v){ dOp.textContent=v.toFixed(2); el.style.opacity=v; }

// ── animation phases ───────────────────────────────────────────────────────
function animate(duration, easeFunc, tickFn){
  return new Promise(resolve=>{
    const t0=performance.now();
    function step(now){
      const elapsed=now-t0;
      const p=Math.min(elapsed/duration,1);
      tickFn(easeFunc(p), p);
      if(p<1) rafId=requestAnimationFrame(step);
      else resolve();
    }
    rafId=requestAnimationFrame(step);
  });
}

async function runSplash(){
  if(running){ cancelAnimationFrame(rafId); }
  running=true;

  // reset
  overlay.style.opacity='1'; overlay.style.display='flex';
  content.style.opacity='0';
  setAngle(0);

  // 1 render frame (simulate DispatcherPriority.Render wait)
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  setPhase('fade-in');

  // Phase 1: fade in content (280ms CubicEaseOut)
  await animate(280, cubicEaseOut, (e)=>{
    content.style.opacity=e;
    dOp.textContent=e.toFixed(2);
  });
  content.style.opacity='1';
  setPhase('spin');

  // Phase 2: spin loop (1 cycle = 1500ms budget)
  const spinStart=performance.now();
  let cycleStart=spinStart;
  let inHold=false;
  let holdStart=0;
  let angle=0;

  await new Promise(resolve=>{
    function spinFrame(now){
      const total=now-spinStart;
      if(total>=T_TOTAL_SPIN){ setAngle(0); resolve(); return; }

      if(!inHold){
        const t=Math.min((now-cycleStart)/T_SPIN,1);
        angle=spline(t,0.2,0.8,0.4,1.0)*360;
        setAngle(angle);
        dAngle.textContent=angle.toFixed(1)+'°';
        if(t>=1){ inHold=true; angle=0; holdStart=now; }
      } else {
        if(now-holdStart>=T_HOLD){ inHold=false; cycleStart=now; }
      }
      rafId=requestAnimationFrame(spinFrame);
    }
    rafId=requestAnimationFrame(spinFrame);
  });

  setPhase('fade-out');

  // Phase 3: fade out overlay (260ms CubicEaseIn)
  await animate(260, cubicEaseIn, (e)=>{
    overlay.style.opacity=1-e;
    dOp.textContent=(1-e).toFixed(2);
  });
  overlay.style.display='none';
  setPhase('done');
  running=false;
}

function replay(){ runSplash(); }

let debugOn=false;
function toggleDebug(){
  debugOn=!debugOn;
  logoWrapper.style.outline=debugOn?'1px solid red':'none';
  // add crosshair at center
  const old=document.getElementById('crosshair');
  if(old) old.remove();
  if(debugOn){
    const c=document.createElement('div');
    c.id='crosshair';
    c.style.cssText='position:absolute;pointer-events:none;z-index:20;'+
      'left:calc(50% - 0.5px);top:calc(50% - 10px);width:1px;height:20px;background:red;';
    const c2=document.createElement('div');
    c2.style.cssText='position:absolute;pointer-events:none;z-index:20;'+
      'top:calc(50% - 0.5px);left:calc(50% - 10px);height:1px;width:20px;background:red;';
    overlay.appendChild(c);
    overlay.appendChild(c2);
    document.getElementById('btnDebug').textContent='■ Hide axis';
  } else {
    document.getElementById('btnDebug').textContent='□ Show axis';
  }
}

// auto-start
runSplash();
</script>
</body>
