<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    NexStrap icon
    - Roblox-proportioned square, 15° tilt, stroke only (no fill)
    - N mark as 3 strokes inside
    - White, transparent background
  -->
  <g transform="rotate(15,256,256)"
     fill="none" stroke="#FFFFFF" stroke-width="28"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer square — Roblox logo shape, outline only -->
    <rect x="72" y="72" width="368" height="368" rx="40"/>

    <!-- N mark: left bar / diagonal / right bar -->
    <line x1="152" y1="152" x2="152" y2="360"/>
    <line x1="152" y1="152" x2="360" y2="360"/>
    <line x1="360" y1="152" x2="360" y2="360"/>

  </g>
</svg>
